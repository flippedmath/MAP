{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAP | Math Assessment Platform</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="{% static 'assessment_tool/css/base_style.css' %}">

    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav>
        <div style="font-weight: bold; font-size: 1.2rem;">MAP</div>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" style="color: white; text-decoration: none;">Dashboard</a>
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn" style="padding: 5px 10px; font-size: 0.8rem;">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" style="color: white; text-decoration: none;">Login</a>
            {% endif %}
        </div>
    </nav>
    <main class="container">
        {% if messages %}
            <div class="messages-container">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>    
</body>
</html>
